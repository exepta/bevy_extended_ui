<html>
  <head>
    <meta name="badge-demo" />
    <link rel="stylesheet" href="badge.css" />
  </head>
  <body>
    <h3>Badge Demo (WASM)</h3>

    <div class="notification-target">
      <button id="inbox-button">Inbox</button>
    </div>
    <badge for="inbox-button" value="112" max="99" anchor="top right"></badge>

    <div class="notification-target direct-parent-example">
      <button>Parent-bound badge</button>
      <badge value="8" max="99" anchor="bottom right"></badge>
    </div>

    <badge value="5" max="99" anchor="top right"></badge>
  </body>
</html>
