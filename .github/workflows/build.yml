name: Build

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.toml') }}

      - name: Install Nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends \
            pkg-config \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev

      - name: Install coverage tool if not installed
        run: |
          if ! command -v cargo-llvm-cov &> /dev/null; then
            cargo install cargo-llvm-cov
          else
            echo "cargo-llvm-cov is already installed"
          fi

      - name: Run cargo test coverage
        run: |
          IGNORE_REGEX='(crates/bevy_extended_ui_macros|src/widgets/(content|controls)|src/widgets/body.rs|src/widgets/div.rs|src/widgets/form.rs|src/widgets/validation.rs|src/widgets/mod.rs|src/widgets/widget_util.rs|src/services/style_service.rs|src/services/style_service/.*|src/services/css_service.rs|src/services/image_service.rs|src/services/state_service.rs|src/services/mod.rs|src/styles/parser.rs|src/styles/paint.rs|src/html/bindings.rs|src/html/converter.rs|src/html/builder.rs|src/providers/theme_provider.rs|src/providers/mod.rs|src/utils.rs|src/example_utils.rs|src/old/registry.rs|src/dialog/mod.rs|src/io/mod.rs|src/lang.rs|src/lib.rs)'
          cargo llvm-cov \
            --workspace \
            --features extended-framework \
            --fail-under-regions 90 \
            --ignore-filename-regex "$IGNORE_REGEX" \
            --lcov \
            --output-path coverage.lcov

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
